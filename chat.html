<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>چت روم</title>

<style>

*{
box-sizing:border-box;
}


body{

margin:0;

font-family:tahoma;

color:white;

min-height:100vh;


background:

linear-gradient(
rgba(0,0,0,.7),
rgba(0,0,0,.9)
),

url("horror-bg.png");


background-size:cover;

background-position:center;

background-attachment:fixed;

}



.header{

position:sticky;

top:0;

z-index:10;

background:rgba(0,0,0,.65);

backdrop-filter:blur(15px);

padding:20px;

text-align:center;

border-bottom:1px solid #333;

}



.header h2{

margin:0;

font-size:28px;

}



#welcome{

color:#00ff99;

}



.chat{

height:65vh;

overflow-y:auto;

padding:20px;

}




.message{

background:rgba(255,255,255,.1);

backdrop-filter:blur(10px);

padding:18px;

margin:15px 0;

border-radius:25px;

border:1px solid rgba(255,255,255,.15);

box-shadow:0 0 20px rgba(0,255,150,.25);

}



.admin{

border:1px solid #00ff99;

box-shadow:0 0 25px #009b62;

}




.name{

font-weight:bold;

color:#00ff99;

margin-bottom:10px;

}



.text{

line-height:2;

font-size:16px;

}




.input{

position:fixed;

bottom:0;

right:0;

left:0;

display:flex;

gap:10px;

padding:15px;

background:rgba(0,0,0,.75);

backdrop-filter:blur(15px);

}



input{

flex:1;

padding:15px;

border-radius:15px;

border:0;

outline:none;

font-size:16px;

}




button{

background:#009b62;

color:white;

border:0;

padding:12px 25px;

border-radius:15px;

cursor:pointer;

}



.logout{

background:#b30000;

margin-top:10px;

}




</style>

</head>

  <body class="chat-page">


<div class="header">

<h2>
👻 💬 چت‌روم
</h2>


<p id="welcome"></p>


<button class="logout" id="logout">

خروج

</button>


</div>





<div id="chat" class="chat"></div>





<div class="input">

<input 
id="message"
placeholder="پیام بنویسید...">



<button id="send">

ارسال

</button>


</div>







<script type="module">


import { createClient }

from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";




const supabase=createClient(

"https://ezrvqpnxswpzaygbjeio.supabase.co",

"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6cnZxcG54c3dwemF5Z2JqZWlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MjE4NDcsImV4cCI6MjA5OTE5Nzg0N30.w13RkRJ9_uxCIHRb8cvShmtrmXGskuUYRlfZ8w8OQIs"

);




const username=localStorage.getItem("user");



if(!username){

window.location.href="login.html";

}




document.getElementById("welcome").innerHTML=

"خوش آمدی 👤 "+username;





const chat=document.getElementById("chat");





async function loadMessages(){


const {data,error}=await supabase

.from("messages")

.select("*")

.order("created_at");



if(error)return;



chat.innerHTML="";



data.forEach(m=>{


let adminClass =

m.username==="admin" ? "admin" : "";



chat.innerHTML+=`

<div class="message ${adminClass}">


<div class="name">

${m.username==="admin" ? "👑 مدیر" : "👤 "+m.username}

</div>


<div class="text">

${m.message}

</div>


</div>

`;


});



chat.scrollTop=chat.scrollHeight;


}



loadMessages();





supabase

.channel("messages")

.on(

"postgres_changes",

{

event:"INSERT",

schema:"public",

table:"messages"

},

()=>{

loadMessages();

}

)

.subscribe();







document.getElementById("send").onclick=async()=>{


const text=document.getElementById("message").value.trim();



if(!text)return;



await supabase

.from("messages")

.insert({

username:username,

message:text

});



document.getElementById("message").value="";


};






document.getElementById("logout").onclick=()=>{


localStorage.removeItem("user");


window.location.href="login.html";


};




</script>


</body>

</html>
