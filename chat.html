<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<title>چت روم</title>

<style>

body{
margin:0;
background:#050505;
color:white;
font-family:tahoma;
}

.header{
background:#063b2b;
padding:20px;
text-align:center;
}

.chat{
height:70vh;
overflow:auto;
padding:20px;
}

.message{
background:#151515;
padding:15px;
margin:10px;
border-radius:15px;
box-shadow:0 0 10px #009b62;
}

.name{
color:#00ff99;
font-weight:bold;
}

.input{
display:flex;
padding:15px;
}

input{
flex:1;
padding:15px;
border-radius:10px;
border:0;
}

button{
margin-right:10px;
background:#009b62;
color:white;
border:0;
padding:15px 25px;
border-radius:10px;
}

</style>

</head>


<body>


<div class="header">

<h2>💬 چت‌روم</h2>

</div>


<div id="chat" class="chat"></div>


<div class="input">

<input id="message" placeholder="پیام بنویسید">

<button id="send">
ارسال
</button>

</div>



<script type="module">


import {

initializeApp

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy,
doc,
getDoc,
serverTimestamp

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyB2oPTrdqG6HWVLIPoh_HOmXHb98sHEQKg",

authDomain: "mahdi-summer-chat.firebaseapp.com",

projectId: "mahdi-summer-chat",

storageBucket: "mahdi-summer-chat.firebasestorage.app",

messagingSenderId: "189185718526",

appId: "1:189185718526:web:497085957853202ebb4daf"

};



const app =
initializeApp(firebaseConfig);


const db =
getFirestore(app);



const username =
localStorage.getItem("user");



let myName = username;



if(username){


const userSnap =
await getDoc(
doc(db,"users",username)
);


if(userSnap.exists()){

myName =
userSnap.data().name;

}


}



const chat =
document.getElementById("chat");



const q =
query(
collection(db,"messages"),
orderBy("time")
);



onSnapshot(q,(snapshot)=>{


chat.innerHTML="";


snapshot.forEach((item)=>{


const m =
item.data();


chat.innerHTML += `

<div class="message">

<div class="name">
👤 ${m.user}
</div>

<br>

${m.text}

</div>

`;



});


});




document.getElementById("send").onclick = async()=>{


let text =
document.getElementById("message").value;


if(text=="") return;



await addDoc(

collection(db,"messages"),

{

text:text,

user:myName,

username:username,

time:serverTimestamp()

}

);



document.getElementById("message").value="";


};



</script>


</body>

</html>
