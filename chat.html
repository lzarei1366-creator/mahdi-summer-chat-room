<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>چت روم کلاس‌های تابستانی مسجد المهدی (عج)</title>

<style>

body{
    margin:0;
    background:#050505;
    color:white;
    font-family:tahoma;
}

.header{
    background:#063b2b;
    padding:15px;
    text-align:center;
}

.chat{
    height:65vh;
    padding:20px;
    overflow:auto;
}

.message{
    background:#151515;
    padding:12px;
    margin:10px;
    border-radius:15px;
}

.input{
    display:flex;
    padding:15px;
}

input{
    flex:1;
    padding:15px;
    border-radius:10px;
    border:none;
}

button{
    margin-right:10px;
    background:#009b62;
    color:white;
    border:0;
    padding:15px 25px;
    border-radius:10px;
}

</style>

</head>


<body>

<div class="header">
<h2>💬 کلاس‌های تابستانی مسجد المهدی (عج)</h2>
</div>


<div id="chat" class="chat"></div>


<div class="input">

<input id="message" placeholder="پیام بنویسید">

<button id="send">
ارسال
</button>

</div>


<script type="module">

import { initializeApp } from 
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import { 
getFirestore,
collection,
addDoc,
onSnapshot,
serverTimestamp,
query,
orderBy
}
from 
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyB2oPTrdqG6HWVLIPoh_HOmXHb98sHEQKg",

authDomain: "mahdi-summer-chat.firebaseapp.com",

projectId: "mahdi-summer-chat",

storageBucket: "mahdi-summer-chat.firebasestorage.app",

messagingSenderId: "189185718526",

appId: "1:189185718526:web:497085957853202ebb4daf"

};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


const chat = document.getElementById("chat");


const q = query(
collection(db,"messages"),
orderBy("time")
);


onSnapshot(q,(snapshot)=>{


chat.innerHTML="";


snapshot.forEach((doc)=>{


let data = doc.data();


chat.innerHTML += `

<div class="message">

👤 ${data.user || "کاربر"}

<br>

${data.text}

</div>

`;

});


});


document
.getElementById("send")
.onclick = async ()=>{


let text =
document.getElementById("message").value;


if(text=="") return;


await addDoc(
collection(db,"messages"),
{

text:text,

user:"کاربر",

time:serverTimestamp()

});


document.getElementById("message").value="";


};


</script>


body{
    margin:0;
    background:
    linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.85)),
    url("https://images.unsplash.com/photo-1519608487953-e999c86e7455")
    center/cover fixed;

    color:white;
    font-family:tahoma;
}
</html>
