<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>چت روم</title>

<style>

body{
margin:0;
background:#050505;
color:white;
font-family:tahoma;
}

.header{
background:#063b2b;
padding:15px;
text-align:center;
}

.chat{
height:65vh;
overflow:auto;
padding:20px;
}

.message{
background:#151515;
padding:15px;
margin:10px;
border-radius:15px;
box-shadow:0 0 10px #009b62;
}

.name{
color:#00ff99;
font-weight:bold;
}

.input{
display:flex;
padding:15px;
}

input{
flex:1;
padding:15px;
border-radius:10px;
border:0;
}

button{
margin-right:10px;
background:#009b62;
color:white;
border:0;
padding:15px 25px;
border-radius:10px;
cursor:pointer;
}

.logout{
background:#b30000;
}

</style>

</head>


<body>


<div class="header">

<h2>💬 چت‌روم</h2>

<p id="welcome"></p>

<button class="logout" id="logout">
خروج
</button>

</div>



<div id="chat" class="chat"></div>



<div class="input">

<input id="message" placeholder="پیام بنویسید">

<button id="send">
ارسال
</button>

</div>



<script type="module">


import { createClient }
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";



const supabaseUrl =
"https://ezrvqpnxswpzaygbjeio.supabase.co";



const supabaseKey =
"کلید anon خودت را اینجا قرار بده";



const supabase =
createClient(
supabaseUrl,
supabaseKey
);



const username =
localStorage.getItem("user");



if(!username){

alert("ابتدا وارد حساب شوید");

window.location.href="login.html";

}



document.getElementById("welcome").innerHTML =
"خوش آمدی " + username;



const chat =
document.getElementById("chat");



// نمایش پیام‌های قبلی

async function loadMessages(){


const {data,error}=await supabase

.from("messages")

.select("*")

.order("created_at");


if(error){

console.log(error);

return;

}



chat.innerHTML="";


data.forEach(m=>{


chat.innerHTML += `

<div class="message">

<div class="name">
👤 ${m.username}
</div>

<br>

${m.message}

</div>

`;

});


chat.scrollTop=chat.scrollHeight;


}



loadMessages();




// پیام‌های جدید لحظه‌ای

supabase

.channel("messages")

.on(

"postgres_changes",

{

event:"INSERT",

schema:"public",

table:"messages"

},

(payload)=>{


const m=payload.new;



chat.innerHTML += `

<div class="message">

<div class="name">
👤 ${m.username}
</div>

<br>

${m.message}

</div>

`;



}

)

.subscribe();






// ارسال پیام


document.getElementById("send").onclick =
async()=>{


let text =
document.getElementById("message").value.trim();



if(text===""){

alert("پیام خالی است");

return;

}



const {error}=await supabase

.from("messages")

.insert({

username:username,

message:text

});



if(error){

alert(error.message);

}

else{

document.getElementById("message").value="";

}


};





// خروج

document.getElementById("logout").onclick=()=>{


localStorage.removeItem("user");

window.location.href="login.html";


};



</script>


</body>

</html>
