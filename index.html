<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>کلاس‌های تابستانی مسجد المهدی (عج)</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

font-family:tahoma;

min-height:100vh;

color:white;

background:

linear-gradient(
rgba(0,0,0,.75),
rgba(0,0,0,.9)
),

url("https://images.unsplash.com/photo-1519608487953-e999c86e7455");


background-size:cover;

background-position:center;

background-attachment:fixed;

}



header{

text-align:center;

padding:70px 20px 40px;

}



.logo{

width:180px;

height:180px;

object-fit:cover;

border-radius:50%;

display:block;

margin:auto;

border:4px solid white;

box-shadow:0 0 35px #00ff99;

animation:float 3s infinite ease-in-out;

}



@keyframes float{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-15px);
}

100%{
transform:translateY(0);
}

}



h1{

font-size:38px;

margin:25px 0;

animation:show 1s;

}



@keyframes show{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}



header p{

font-size:20px;

color:#ddd;

}





.container{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:30px;

padding:20px;

}





.card{

width:280px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(15px);

padding:35px 25px;

border-radius:30px;

text-align:center;

border:1px solid rgba(255,255,255,.25);

box-shadow:0 0 30px rgba(0,255,150,.3);

transition:.4s;

animation:card .8s;

}



@keyframes card{

from{

opacity:0;

transform:scale(.8);

}

to{

opacity:1;

transform:scale(1);

}

}



.card:hover{

transform:translateY(-10px);

box-shadow:0 0 45px #00ff99;

}




.card h2{

font-size:25px;

}



.card p{

font-size:18px;

color:#ddd;

}




button{

width:100%;

padding:15px;

border:0;

border-radius:15px;

background:

linear-gradient(
90deg,
#009b62,
#00e899
);


color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}



button:hover{

transform:scale(1.05);

}




a{

text-decoration:none;

}





footer{

text-align:center;

margin-top:60px;

padding:20px;

color:#aaa;

}




@media(max-width:600px){

.logo{

width:140px;

height:140px;

}


h1{

font-size:28px;

}


.card{

width:90%;

}

}


</style>

</head>


<body>



<header>


<img src="1780787289090%20(1).jpg" class="logo">



<h1>

کلاس‌های تابستانی مسجد المهدی (عج)

</h1>



<p>

به سامانه آنلاین کلاس‌ها و چت‌روم خوش آمدید

</p>


</header>





<div class="container">



<div class="card">

<h2>👤 کاربران</h2>

<p>
ثبت‌نام و ورود کاربران
</p>


<a href="register.html">

<button>

ثبت‌نام

</button>

</a>


<br><br>


<a href="login.html">

<button>

ورود

</button>

</a>


</div>





<div class="card">

<h2>💬 چت‌روم</h2>

<p>
گفتگو با اعضای کلاس
</p>


<a href="chat.html">

<button>

ورود به چت

</button>

</a>


</div>





<div class="card">

<h2>👑 مدیریت</h2>

<p>
ورود مدیران سایت
</p>


<a href="admin-login.html">

<button>

ورود ادمین

</button>

</a>


</div>



</div>






<footer>

کلاس‌های تابستانی مسجد المهدی (عج)

</footer>




</body>

</html>
