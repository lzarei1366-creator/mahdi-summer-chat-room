<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>کلاس‌های تابستانی مسجد المهدی (عج)</title>

<style>

*{
box-sizing:border-box
}

body{
margin:0;
font-family:tahoma;
color:#fff;
min-height:100vh;

background:
linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.9)),
url("https://images.unsplash.com/photo-1519608487953-e999c86e7455");

background-size:cover;
background-position:center;
background-attachment:fixed;
}


body:before{
content:"";
position:fixed;
inset:0;
pointer-events:none;

background:
radial-gradient(circle at 20% 20%,rgba(0,255,170,.12),transparent 35%),
radial-gradient(circle at 80% 30%,rgba(0,255,120,.10),transparent 35%);

animation:lights 10s infinite alternate;
}


@keyframes lights{
from{transform:translate(0,0)}
to{transform:translate(30px,-20px)}
}


header{

min-height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;

}


.logo{

width:190px;
height:190px;
border-radius:50%;
border:4px solid #fff;
box-shadow:0 0 40px #00ff99;
animation:float 4s ease-in-out infinite;

}


@keyframes float{

50%{
transform:translateY(-12px)
}

}


h1{

text-shadow:0 0 20px #00ff99;

}


.container{

display:flex;
flex-wrap:wrap;
justify-content:center;
gap:28px;
padding:20px 30px 60px;

}



.card{

width:280px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.2);

border-radius:26px;

padding:30px;

box-shadow:0 0 25px rgba(0,255,150,.25);

}



button{

width:100%;

padding:14px;

border:0;

border-radius:14px;

background:linear-gradient(90deg,#009b62,#00e899);

color:#fff;

font-size:18px;

cursor:pointer;

}


a{
text-decoration:none
}


footer{

text-align:center;

padding:25px;

color:#ccc;

}


</style>

</head>


<body>


<header>

<img class="logo" src="1780787289090%20(1).jpg">


<h1 id="siteTitle">
کلاس‌های تابستانی مسجد المهدی (عج)
</h1>


<p id="about">
به سامانه آنلاین کلاس‌ها و چت‌روم خوش آمدید
</p>


</header>



<div class="container">


<div class="card">

<h2>📢 اطلاعیه‌ها</h2>

<div id="notices">
در حال دریافت اطلاعیه‌ها...
</div>

</div>



<div class="card">

<h2>🎓 کلاس‌ها</h2>

<a href="classes.html">

<button>
ورود به کلاس‌ها
</button>

</a>

</div>



<div class="card">

<h2>💬 چت‌روم</h2>

<a href="chat.html">

<button>
ورود به چت
</button>

</a>

</div>



<div class="card">

<h2>👑 مدیریت</h2>

<a href="admin-login.html">

<button>
ورود ادمین
</button>

</a>

</div>


</div>



<footer>

<p id="contact">

</p>


<p>
کلاس‌های تابستانی مسجد المهدی (عج)
</p>


</footer>





<script type="module">


import { createClient } 
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";



const supabase = createClient(

"https://ezrvqpnxswpzaygbjeio.supabase.co",

"sb_publishable_Jr0xXzuVDA9QzEFize_dvA_ueYO-246"

);




// اطلاعیه‌ها


const box=document.getElementById("notices");


async function loadNotices(){


const {data,error}=await supabase

.from("notices")

.select("*")

.order("id",{ascending:false})

.limit(5);



if(error){

box.innerHTML="خطا در دریافت اطلاعیه‌ها";

return;

}



box.innerHTML="";



if(!data || data.length===0){

box.innerHTML="اطلاعیه‌ای وجود ندارد";

return;

}



data.forEach(n=>{


box.innerHTML += `

<p>

<b>📌 ${n.title}</b>

<br><br>

${n.content}

</p>

<hr>

`;


});


}




// تنظیمات سایت


async function loadSettings(){


const {data,error}=await supabase

.from("settings")

.select("*")

.eq("id",1)

.single();



if(error){

console.log(error);

return;

}



if(data){


document.getElementById("siteTitle").innerText =
data.title || "کلاس‌های تابستانی مسجد المهدی (عج)";



document.getElementById("about").innerText =
data.about || "";



document.getElementById("contact").innerHTML =

"📞 "+(data.phone || "")+
"<br>📍 "+(data.address || "");


}


}



loadNotices();

loadSettings();



</script>


</body>

</html>
