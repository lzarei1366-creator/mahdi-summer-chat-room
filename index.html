<style>

*{
box-sizing:border-box;
}


body{

margin:0;

font-family:tahoma;

min-height:100vh;

color:white;

background:

linear-gradient(
rgba(0,0,0,.75),
rgba(0,0,0,.92)
),

url("https://images.unsplash.com/photo-1519608487953-e999c86e7455");


background-size:cover;

background-position:center;

background-attachment:fixed;

}



header{

text-align:center;

padding:70px 20px 40px;

}



.logo{

width:180px;

height:180px;

object-fit:cover;

border-radius:50%;

display:block;

margin:auto;

border:4px solid white;

box-shadow:0 0 35px #00ff99;

animation:float 3s infinite ease-in-out;

}



@keyframes float{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-15px);
}

100%{
transform:translateY(0);
}

}



h1{

font-size:38px;

margin:25px 0;

}



header p{

font-size:20px;

color:#ddd;

}




.container{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:30px;

padding:20px;

}





.card{

width:280px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(15px);

padding:35px 25px;

border-radius:30px;

text-align:center;

border:1px solid rgba(255,255,255,.25);

box-shadow:

0 0 30px rgba(0,255,150,.3);

transition:.4s;

}



.card:hover{

transform:translateY(-10px);

box-shadow:

0 0 45px #00ff99;

}



.notice{

border:2px solid #00ff99;

}



.card h2{

font-size:25px;

}



.card p{

font-size:17px;

color:#ddd;

line-height:1.8;

}





button{

width:100%;

padding:15px;

border:0;

border-radius:15px;


background:

linear-gradient(
90deg,
#009b62,
#00e899
);


color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}



button:hover{

transform:scale(1.05);

}



a{

text-decoration:none;

}





footer{

text-align:center;

margin-top:60px;

padding:20px;

color:#aaa;

}


</style>


</head>


<body>



<header>

<script type="module">


import { createClient }

from "https://esm.sh/@supabase/supabase-js@2";



const supabase=createClient(

"https://ezrvqpnxswpzaygbjeio.supabase.co",

"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6cnZxcG54c3dwemF5Z2JqZWlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MjE4NDcsImV4cCI6MjA5OTE5Nzg0N30.w13RkRJ9_uxCIHRb8cvShmtrmXgskuUYRlfZ8w8OQIs"

);



const box=document.getElementById("notices");



async function loadNotices(){


const {data,error}=await supabase

.from("notices")

.select("*")

.order("id",{ascending:false})

.limit(5);



if(error){

box.innerHTML="خطا در دریافت اطلاعیه‌ها";

return;

}



box.innerHTML="";



if(!data || data.length===0){

box.innerHTML="اطلاعیه‌ای وجود ندارد";

return;

}



data.forEach(n=>{


box.innerHTML += `

<p>

<b>
📌 ${n.title}
</b>

<br><br>

${n.content}

</p>

<hr>

`;


});


}



loadNotices();



</script>
