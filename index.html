body{

rgba(0,0,0,.9)

url("https://images.unsplash.com/photo-1519608487953-e999c86e7455");

background-position:center;

header{

.logo{

.container{

gap:30px;

padding:20px;

}




.card{

width:280px;

background:

rgba(255,255,255,.12);


backdrop-filter:blur(15px);


padding:35px 25px;


border-radius:30px;


text-align:center;


border:1px solid rgba(255,255,255,.2);


box-shadow:

0 0 30px rgba(0,255,150,.3);


transition:.3s;

}



.card:hover{

transform:translateY(-10px);

box-shadow:

0 0 40px rgba(0,255,150,.5);

}




.card h2{

font-size:25px;

}



.card p{

font-size:18px;

color:#ddd;

}




button{

width:100%;

padding:15px;

border:0;

border-radius:15px;


background:

linear-gradient(
90deg,
#009b62,
#00d98b
);


color:white;


font-size:18px;


cursor:pointer;


transition:.3s;

}



button:hover{

transform:scale(1.05);

}



a{

text-decoration:none;

}



footer{

text-align:center;

margin-top:60px;

padding:20px;

color:#aaa;

}




@media(max-width:600px){


.logo{

width:140px;

height:140px;

}


h1{

font-size:28px;

}



.card{

width:90%;

}


}


</style>
