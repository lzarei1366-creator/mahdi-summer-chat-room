<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>افزودن ادمین</title>
<style>
body{font-family:tahoma;background:#111;color:#fff;display:flex;justify-content:center;padding:30px}
.box{max-width:420px;width:100%;background:#1b1b1b;padding:20px;border-radius:16px}
input,select,button{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none}
button{background:#009b62;color:#fff;cursor:pointer}
</style>
</head>
<body>
<div class="box">
<h2>👑 افزودن ادمین</h2>
<input id="username" placeholder="نام کاربری">
<input id="password" type="password" placeholder="رمز عبور">
<select id="role">
<option value="admin">admin</option>
<option value="superadmin">superadmin</option>
</select>
<button id="save">ثبت ادمین</button>
<p id="msg"></p>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase=createClient(
"https://ezrvqpnxswpzaygbjeio.supabase.co",
"sb_publishable_Jr0xXzuVDA9QzEFize_dvA_ueYO-246"
);

document.getElementById("save").onclick = async () => {

    alert("دکمه کار کرد");

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const role = document.getElementById("role").value;
    const msg = document.getElementById("msg");

    if (!username || !password) {
        msg.innerHTML = "❌ همه فیلدها را پر کنید";
        return;
    }

    // بررسی تکراری نبودن نام کاربری
    const { data: user } = await supabase
        .from("users")
        .select("id")
        .eq("username", username)
        .maybeSingle();

    if (user) {
        msg.innerHTML = "❌ این نام کاربری قبلاً ثبت شده است.";
        return;
    }

const { error } = await supabase
.from("users")
.insert({
    name: username,
    username: username,
    password: password,
    role: role,
    status: "active"
});
    
    if (error) {
        msg.innerHTML = "❌ " + error.message;
        return;
    }

    msg.innerHTML = "✅ ادمین با موفقیت اضافه شد.";

    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
    document.getElementById("role").value = "admin";

    setTimeout(() => {
        window.location.href = "admin-panel.html";
    }, 1500);

};

</script>
</body>
</html>
