<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>

<title>ثبت نام کاربران</title>

<style>

    background:linear-gradient(135deg,#050505,#063b2b);

.box{
    background:#111;
    width:350px;

}

button{
    padding:12px 40px;
    background:#009b62;
    color:white;

    border-radius:10px;
    font-size:17px;
}

a{
    color:#00cc88;
}

<body>

<div class="box">

<h2>ثبت‌نام کاربر جدید</h2>

<input placeholder="نام و نام خانوادگی">

<input placeholder="نام کاربری">

<input type="password" placeholder="رمز عبور">

<br>

<button>ثبت‌نام</button>

<p>
قبلاً ثبت‌نام کرده‌اید؟

</p>
