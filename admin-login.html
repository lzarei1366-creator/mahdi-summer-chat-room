<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ورود ادمین</title>

<style>
body{
    background:linear-gradient(135deg,#000,#1a0000);
    color:white;
    font-family:tahoma;
    text-align:center;
    padding-top:80px;
}

.box{
    background:#111;
    width:350px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 30px #b30000;
}

h2{
    color:#ff4444;
}

input{
    width:90%;
    padding:12px;
    margin:10px;
    border-radius:10px;
    border:none;
}

button{
    padding:12px 45px;
    background:#b30000;
    color:white;
    border:0;
    border-radius:10px;
    font-size:17px;
}

button:hover{
    background:#ff0000;
}
</style>

</head>

<body>

<div class="box">

<h2>ورود مدیریت</h2>

<input placeholder="نام کاربری ادمین">

<input type="password" placeholder="رمز عبور">

<br>

<button>ورود به پنل</button>

</div>

</body>
</html>
