<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<title>ورود ادمین</title>

<style>
body{
background:#050505;
color:white;
font-family:tahoma;
text-align:center;
padding-top:80px;
}

.box{
background:#111;
width:350px;
margin:auto;
padding:30px;
border-radius:20px;
box-shadow:0 0 30px #b30000;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:none;
}

button{
padding:12px 40px;
background:#b30000;
color:white;
border:0;
border-radius:10px;
}
</style>

</head>


<body>

<div class="box">

<h2>👑 ورود مدیریت</h2>

<input id="email" placeholder="ایمیل ادمین">

<input id="password" type="password" placeholder="رمز عبور">

<br>

<button id="login">
ورود
</button>

</div>


<script type="module">

import { auth } from "./firebase-config.js";

import {
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


document.getElementById("login")
.onclick = async ()=>{


let email =
document.getElementById("email").value;


let password =
document.getElementById("password").value;


try{

await signInWithEmailAndPassword(
auth,
email,
password
);


alert("ورود ادمین موفق بود");


window.location.href="admin-panel.html";


}

catch(e){

alert("دسترسی غیرمجاز");

}


};


</script>


</body>

</html>
