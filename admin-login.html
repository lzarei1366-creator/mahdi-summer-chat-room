<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ورود مدیریت</title>

<style>

*{
box-sizing:border-box;
}


body{

margin:0;

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

font-family:tahoma;

color:white;


background:

linear-gradient(
rgba(0,0,0,.7),
rgba(0,0,0,.9)
),

url("https://images.unsplash.com/photo-1519608487953-e999c86e7455");


background-size:cover;

background-position:center;

}





.box{


width:360px;


padding:35px;


background:rgba(255,255,255,.12);


backdrop-filter:blur(15px);



border-radius:30px;



border:1px solid rgba(255,255,255,.2);



box-shadow:

0 0 35px rgba(0,255,150,.4);



text-align:center;



}




.logo{

font-size:70px;

}




h2{

margin-bottom:25px;

}




input{


width:100%;


padding:15px;



margin:10px 0;



border-radius:15px;



border:0;



outline:none;



font-size:16px;



}




button{


width:100%;


padding:15px;



margin-top:15px;



border:0;



border-radius:15px;



background:

linear-gradient(
90deg,
#009b62,
#00d98b
);



color:white;



font-size:18px;



cursor:pointer;



transition:.3s;



}




button:hover{

transform:scale(1.05);

}



</style>

</head>



<body>




<div class="box">


<div class="logo">

👑

</div>



<h2>
ورود مدیریت
</h2>



<input 

id="username"

type="text"

placeholder="نام کاربری">





<input 

id="password"

type="password"

placeholder="رمز عبور">





<button id="adminLoginBtn">
ورود مدیر
</button>

<div id="adminResult"></div>



</div>

<script type="module">

import { createClient } 
from "https://esm.sh/@supabase/supabase-js@2";


const supabase = createClient(

"https://ezrvqpnxswpzaygbjeio.supabase.co",

"sb_publishable_Jr0xXzuVDA9QzEFize_dvA_ueYO-246"

);



document.getElementById("adminLoginBtn").onclick = async()=>{


const username = document.getElementById("username").value.trim();

const password = document.getElementById("password").value.trim();



if(!username || !password){

alert("نام کاربری و رمز عبور را وارد کنید");

return;

}

const {data,error}= await supabase

.from("users")

.select("*")

.eq("username",username)

.eq("password",password)

.maybeSingle();



console.log(data);
console.log(error);
alert(JSON.stringify(data));


if(error || !data){

console.log("DATA:", data);
console.log("ERROR:", error);

alert("کاربر پیدا نشد");

return;

}

alert("ورود موفق");



localStorage.setItem(
"admin",
data.username
);



window.location.href="admin-panel.html";
