<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ورود مدیریت</title>

<style>

body{
background:#050505;
color:white;
font-family:tahoma;
text-align:center;
padding-top:80px;
}

.box{
background:#111;
width:350px;
margin:auto;
padding:30px;
border-radius:20px;
box-shadow:0 0 25px #009b62;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
padding:12px;
width:90%;
background:#009b62;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#00b874;
}

</style>

</head>

<body>

<div class="box">

<h2>👑 ورود مدیریت</h2>

<input id="username" type="text" placeholder="نام کاربری">

<input id="password" type="password" placeholder="رمز عبور">

<button id="login">ورود</button>

</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
"https://ezrvqpnxswpzaygbjeio.supabase.co",
"sb_publishable_Jr0xXzuVDA9QzEFize_dvA_ueYO-246"
);

document.getElementById("login").addEventListener("click", async ()=>{

const username =
document.getElementById("username").value.trim();

const password =
document.getElementById("password").value.trim();

if(username==="" || password===""){
alert("نام کاربری و رمز عبور را وارد کنید");
return;
}

const { data, error } = await supabase
.from("admins")
.select("*")
.eq("username", username)
.eq("password", password)
.single();

if(error){
alert(error.message);
console.log(error);
return;
}

if(!data){
alert("نام کاربری یا رمز عبور اشتباه است");
return;
}

localStorage.setItem("admin", data.username);
localStorage.setItem("role", data.role);

window.location.href="admin-panel.html";

});

</script>

</body>

</html>
