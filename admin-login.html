<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ورود مدیریت</title>

<style>

body{
background:#050505;
color:white;
font-family:tahoma;
text-align:center;
padding-top:80px;
}

.box{
background:#111;
width:350px;
margin:auto;
padding:30px;
border-radius:20px;
box-shadow:0 0 25px #009b62;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:0;
}

button{
padding:12px 40px;
background:#009b62;
color:white;
border:0;
border-radius:10px;
cursor:pointer;
}

</style>

</head>


<body>


<div class="box">

<h2>👑 ورود مدیر</h2>


<input id="username" placeholder="نام کاربری">


<input id="password" type="password" placeholder="رمز عبور">


<br>

<button id="login">
ورود
</button>


</div>



<script type="module">


import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getFirestore,

doc,

getDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyB2oPTrdqG6HWVLIPoh_HOmXHb98sHEQKg",

authDomain: "mahdi-summer-chat.firebaseapp.com",

projectId: "mahdi-summer-chat",

storageBucket: "mahdi-summer-chat.firebasestorage.app",

messagingSenderId: "189185718526",

appId: "1:189185718526:web:497085957853202ebb4daf"

};



const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



document.getElementById("login").onclick = async()=>{


const username =
document.getElementById("username").value;


const password =
document.getElementById("password").value;



const adminRef =
doc(db,"admins",username);



const adminSnap =
await getDoc(adminRef);



if(!adminSnap.exists()){

alert("مدیر پیدا نشد");

return;

}



const admin =
adminSnap.data();



if(admin.password != password){

alert("رمز عبور اشتباه است");

return;

}



localStorage.setItem(
"admin",
username
);



localStorage.setItem(
"role",
admin.role
);



alert("ورود موفق");


window.location.href="admin-panel.html";


};



</script>


</body>

</html>
