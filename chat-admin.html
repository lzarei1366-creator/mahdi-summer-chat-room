<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<title>مدیریت چت روم</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#080808;
color:white;
font-family:tahoma;
padding:20px;
}

.box{
background:#151515;
padding:20px;
margin:15px auto;
max-width:600px;
border-radius:15px;
box-shadow:0 0 15px #009b62;
}

button{
background:#b30000;
color:white;
border:0;
padding:10px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>


<body>


<h1>💬 مدیریت چت روم</h1>


<div id="messages"></div>



<script type="module">


import { createClient }

from "https://esm.sh/@supabase/supabase-js@2";



const supabase = createClient(

"https://ezrvqpnxswpzaygbjeio.supabase.co",

"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6cnZxcG54c3dwemF5Z2JqZWlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MjE4NDcsImV4cCI6MjA5OTE5Nzg0N30.w13RkRJ9_uxCIHRb8cvShmtrmXGskuUYRlfZ8w8OQIs"

);




const box =
document.getElementById("messages");




async function loadMessages(){


const {data,error}=await supabase

.from("messages")

.select("*")

.order("created_at");



if(error){

console.log(error);

return;

}



box.innerHTML="";



data.forEach(m=>{


box.innerHTML += `

<div class="box">

<p>👤 ${m.username}</p>

<p>${m.message}</p>


<button onclick="deleteMessage('${m.id}')">

حذف پیام

</button>


</div>

`;


});


}



loadMessages();




// دریافت پیام‌های جدید لحظه‌ای


supabase

.channel("admin-messages")

.on(

"postgres_changes",

{

event:"INSERT",

schema:"public",

table:"messages"

},

()=>{

loadMessages();

}

)

.subscribe();







window.deleteMessage = async function(id){



const {error}=await supabase

.from("messages")

.delete()

.eq("id",id);



if(error){

alert(error.message);

return;

}



alert("پیام حذف شد");


loadMessages();


}



</script>


</body>

</html>
