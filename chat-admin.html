<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مدیریت چت روم</title>

<style>

body{
background:#080808;
color:white;
font-family:tahoma;
padding:20px;
}

.box{
background:#151515;
padding:20px;
margin:15px auto;
max-width:600px;
border-radius:15px;
box-shadow:0 0 15px #009b62;
}

.input{
display:flex;
max-width:600px;
margin:auto;
gap:10px;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:0;
}

button{
background:#009b62;
color:white;
border:0;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.delete{
background:#b30000;
}

</style>

</head>


<body>


<h1>👑 مدیریت چت روم</h1>


<div class="input">

<input id="message" placeholder="پیام ادمین">

<button id="send">
ارسال
</button>

</div>


<div id="messages"></div>




<script type="module">


import { createClient }

from "https://esm.sh/@supabase/supabase-js@2";



const supabase=createClient(

"https://ezrvqpnxswpzaygbjeio.supabase.co",

"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6cnZxcG54c3dwemF5Z2JqZWlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MjE4NDcsImV4cCI6MjA5OTE5Nzg0N30.w13RkRJ9_uxCIHRb8cvShmtrmXGskuUYRlfZ8w8OQIs"

);




const box=document.getElementById("messages");



async function loadMessages(){


const {data,error}=await supabase

.from("messages")

.select("*")

.order("created_at");



if(error){
console.log(error);
return;
}



box.innerHTML="";



data.forEach(m=>{


box.innerHTML += `

<div class="box">

<b>👤 ${m.username}</b>

<p>${m.message}</p>


<button class="delete" onclick="deleteMessage(${m.id})">

حذف

</button>


</div>

`;


});


}



loadMessages();





// دریافت لحظه‌ای پیام‌ها

supabase

.channel("admin-chat")

.on(

"postgres_changes",

{

event:"INSERT",

schema:"public",

table:"messages"

},

()=>{

loadMessages();

}

)

.subscribe();







// ارسال پیام ادمین


document.getElementById("send").onclick=async()=>{


const text=document
.getElementById("message")
.value
.trim();



if(!text){

return;

}



const {error}=await supabase

.from("messages")

.insert({

username:"admin",

message:text

});



if(error){

alert(error.message);

return;

}



document.getElementById("message").value="";


};







window.deleteMessage=async(id)=>{


const {error}=await supabase

.from("messages")

.delete()

.eq("id",id);



if(error){

alert(error.message);

return;

}


loadMessages();


};



</script>


</body>

</html>
