<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>افزودن کاربر</title>

<style>

body{
background:#080808;
color:white;
font-family:tahoma;
text-align:center;
padding-top:50px;
}

.box{
background:#151515;
width:350px;
margin:auto;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px #009b62;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:0;
}

button{
background:#009b62;
color:white;
border:0;
padding:12px 30px;
border-radius:10px;
cursor:pointer;
}

</style>

</head>


<body>


<div class="box">

<h2>➕ افزودن کاربر</h2>


<input id="name" placeholder="نام کاربر">

<input id="username" placeholder="نام کاربری">

<input id="password" type="password" placeholder="رمز عبور">


<button id="save">
ساخت کاربر
</button>


</div>



<script type="module">


import { createClient }

from "https://esm.sh/@supabase/supabase-js@2";



const supabase = createClient(

"https://ezrvqpnxswpzaygbjeio.supabase.co",

"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6cnZxcG54c3dwemF5Z2JqZWlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MjE4NDcsImV4cCI6MjA5OTE5Nzg0N30.w13RkRJ9_uxCIHRb8cvShmtrmXGskuUYRlfZ8w8OQIs"

);





document.getElementById("save").onclick = async()=>{


const name =
document.getElementById("name").value.trim();


const username =
document.getElementById("username").value.trim();


const password =
document.getElementById("password").value.trim();



if(!name || !username || !password){

alert("همه فیلدها را پر کنید");

return;

}



const {error}=await supabase

.from("users")

.insert({

name:name,

username:username,

password:password,

status:"active"

});




if(error){

alert(error.message);

return;

}



alert("کاربر ساخته شد");



document.getElementById("name").value="";

document.getElementById("username").value="";

document.getElementById("password").value="";



};



</script>


</body>

</html>
