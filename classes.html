<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>کلاس‌های تابستانی</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

font-family:tahoma;

min-height:100vh;

color:white;


background:

linear-gradient(
rgba(0,0,0,.75),
rgba(0,0,0,.9)
),

url("https://images.unsplash.com/photo-1519608487953-e999c86e7455");


background-size:cover;

background-position:center;

}



header{

text-align:center;

padding:50px 20px;

}



.logo{

width:130px;

height:130px;

border-radius:50%;

object-fit:cover;

border:3px solid white;

box-shadow:0 0 30px #00ff99;

}



h1{

font-size:35px;

}





.container{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:25px;

padding:20px;

}




.card{

width:280px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(15px);

padding:25px;

border-radius:25px;

text-align:center;

box-shadow:0 0 25px rgba(0,255,150,.3);

}



.card h2{

color:#00ff99;

}




button{

width:100%;

padding:15px;

border:0;

border-radius:15px;

background:#009b62;

color:white;

font-size:17px;

cursor:pointer;

}



button:hover{

background:#00d98b;

}



a{

text-decoration:none;

}




</style>

</head>


<body>



<header>


<img src="1780787289090%20(1).jpg" class="logo">


<h1>
🎓 کلاس‌های تابستانی مسجد المهدی (عج)
</h1>


<p>
کلاس مورد نظر خود را انتخاب کنید
</p>


</header>






<div class="container">



<div class="card">

<h2>
📖 قرآن و احکام
</h2>


<p>
آموزش قرآن، احکام و معارف اسلامی
</p>


<button onclick="registerClass('قرآن و احکام')">

ثبت‌نام

</button>


</div>






<div class="card">

<h2>
🎨 هنر و خلاقیت
</h2>


<p>
نقاشی، کاردستی و فعالیت هنری
</p>


<button onclick="registerClass('هنر و خلاقیت')">

ثبت‌نام

</button>


</div>







<div class="card">

<h2>
💻 آموزش کامپیوتر
</h2>


<p>
آشنایی با کامپیوتر و فناوری
</p>


<button onclick="registerClass('آموزش کامپیوتر')">

ثبت‌نام

</button>


</div>







<div class="card">

<h2>
⚽ ورزش و سرگرمی
</h2>


<p>
فعالیت ورزشی و تفریحی
</p>


<button onclick="registerClass('ورزش و سرگرمی')">

ثبت‌نام

</button>


</div>




</div>






<script>


function registerClass(name){


let user=localStorage.getItem("user");



if(!user){

alert("ابتدا وارد حساب شوید");

window.location.href="login.html";

return;

}



alert(
"ثبت‌نام شما در کلاس «"+name+"» انجام شد"
);



}



</script>



</body>

</html>
