<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<title>ورود کاربران</title>

<style>

body{
background:#050505;
color:white;
font-family:tahoma;
text-align:center;
padding-top:80px;
}

.box{
background:#111;
width:350px;
margin:auto;
padding:30px;
border-radius:20px;
box-shadow:0 0 25px #00aa66;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:none;
}

button{
padding:12px 40px;
background:#009b62;
color:white;
border:0;
border-radius:10px;
}

</style>

</head>


<body>


<div class="box">

<h2>ورود کاربران</h2>

<input id="email" placeholder="ایمیل">

<input id="password" type="password" placeholder="رمز عبور">

<br>

<button id="login">
ورود
</button>


</div>



<script type="module">


import { auth } from "./firebase-config.js";


import {

signInWithEmailAndPassword

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


import {

getFirestore,

doc,

getDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



const db = getFirestore();



document.getElementById("login").onclick = async ()=>{


const email =
document.getElementById("email").value;


const password =
document.getElementById("password").value;



try{


const result =
await signInWithEmailAndPassword(
auth,
email,
password
);



const userRef =
doc(db,"users",result.user.uid);



const userSnap =
await getDoc(userRef);



if(userSnap.exists()){


const data =
userSnap.data();



if(data.status=="blocked"){


alert("حساب شما مسدود شده است");


return;


}


}



alert("ورود موفق بود");


window.location.href="chat.html";


}


catch(error){


alert("ایمیل یا رمز اشتباه است");


}


};


</script>


</body>

</html>
