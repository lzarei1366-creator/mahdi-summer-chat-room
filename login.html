<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ورود کاربران</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
min-height:100vh;
font-family:tahoma;
color:white;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.9)),
url("https://images.unsplash.com/photo-1519608487953-e999c86e7455");

background-size:cover;
background-position:center;
}

.box{
width:380px;
padding:35px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
border-radius:30px;
border:1px solid rgba(255,255,255,.25);
box-shadow:0 0 40px rgba(0,255,150,.4);
text-align:center;
animation:show .8s;
}

@keyframes show{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
width:130px;
height:130px;
object-fit:cover;
border-radius:50%;
border:3px solid white;
box-shadow:0 0 30px #00ff99;
margin-bottom:20px;
}

h2{
font-size:28px;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border-radius:15px;
border:0;
outline:none;
font-size:16px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:0;
border-radius:15px;
background:linear-gradient(90deg,#009b62,#00e899);
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px rgba(0,255,150,.5);
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="box">

<img src="1780787289090%20(1).jpg" class="logo">

<h2>👤 ورود کاربران</h2>

<input id="username" placeholder="نام کاربری">

<input id="password" type="password" placeholder="رمز عبور">

<button id="login">ورود</button>

</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://ezrvqpnxswpzaygbjeio.supabase.co",
  "sb_publishable_Jr0xXzuVDA9QzEFize_dvA_ueYO-246"
);

document.getElementById("login").addEventListener("click", async () => {

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !password) {
    alert("نام کاربری و رمز عبور را وارد کنید");
    return;
  }

  try {

    const { data, error } = await supabase
      .from("users")
      .select("*")
      .eq("username", username)
      .maybeSingle();

    console.log("DATA:", data);
    console.log("ERROR:", error);

    if (error) {
      alert("خطای پایگاه داده: " + error.message);
      return;
    }

    if (!data) {
      alert("نام کاربری پیدا نشد");
      return;
    }

    if (data.password !== password) {
      alert("رمز عبور اشتباه است");
      return;
    }

    if (data.status === "blocked") {
      alert("حساب شما توسط مدیر مسدود شده است");
      return;
    }

    localStorage.setItem("user", data.username);
    localStorage.setItem("name", data.name);

    window.location.href = "chat.html";

  } catch (err) {

    console.error(err);
    alert("خطای غیرمنتظره: " + err.message);

  }

});

</script>

</body>
</html>
