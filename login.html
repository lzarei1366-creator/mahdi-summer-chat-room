<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ورود کاربران</title>

<style>

body{
background:#050505;
color:white;
font-family:tahoma;
text-align:center;
padding-top:80px;
}

.box{
background:#111;
width:350px;
margin:auto;
padding:30px;
border-radius:20px;
box-shadow:0 0 25px #009b62;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:0;
}

button{
padding:12px 40px;
background:#009b62;
color:white;
border:0;
border-radius:10px;
cursor:pointer;
}

</style>

</head>


<body>


<div class="box">


<h2>👤 ورود کاربران</h2>


<input id="username" placeholder="نام کاربری">


<input id="password" type="password" placeholder="رمز عبور">


<br>


<button id="login">
ورود
</button>


</div>




<script type="module">


import { createClient }

from "https://esm.sh/@supabase/supabase-js@2";



const supabase = createClient(

"https://ezrvqpnxswpzaygbjeio.supabase.co",

"کلید Supabase خودت را اینجا بگذار"

);





document.getElementById("login").onclick = async()=>{



const username =
document.getElementById("username").value.trim();



const password =
document.getElementById("password").value.trim();





if(!username || !password){

alert("نام کاربری و رمز را وارد کنید");

return;

}





const {data,error}=await supabase

.from("users")

.select("*")

.eq("username",username)

.eq("password",password)

.single();





if(error || !data){

alert("نام کاربری یا رمز عبور اشتباه است");

return;

}





if(data.status==="blocked"){

alert("حساب شما مسدود شده است");

return;

}





localStorage.setItem(
"user",
data.username
);



window.location.href="chat.html";



};



</script>


</body>

</html>
