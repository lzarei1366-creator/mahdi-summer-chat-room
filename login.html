<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ورود کاربران</title>

<style>
body{
background:linear-gradient(135deg,#050505,#063b2b);
color:white;
font-family:tahoma;
text-align:center;
padding-top:80px;
}

.box{
background:#111;
width:350px;
margin:auto;
padding:30px;
border-radius:20px;
box-shadow:0 0 25px #00aa66;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:none;
}

button{
padding:12px 40px;
background:#009b62;
color:white;
border:0;
border-radius:10px;
font-size:17px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>ورود کاربران</h2>

<input id="email" placeholder="ایمیل">

<input id="password" type="password" placeholder="رمز عبور">

<br>

<button id="login">ورود</button>

</div>


<script type="module">

import { auth } from "./firebase-config.js";

import {
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


document
.getElementById("login")
.addEventListener("click", async ()=>{


const email =
document.getElementById("email").value;


const password =
document.getElementById("password").value;


try{


await signInWithEmailAndPassword(
auth,
email,
password
);


alert("ورود موفق بود");


window.location.href="chat.html";


}

catch(error){

alert("ایمیل یا رمز اشتباه است");

}


});


</script>


</body>

</html>
