<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>پنل مدیریت مسجد</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<header>

<div class="container nav">

<div class="logo">
🕌 پنل مدیریت مسجد المهدی (عج)
</div>

<p id="adminName"></p>

<section class="container card">

<h2>

ورود مدیر

</h2>

<input
id="adminUser"
placeholder="نام کاربری مدیر">

<input
id="adminPass"
type="password"
placeholder="رمز عبور مدیر">

<button id="adminLogin">

ورود

</button>

<p id="adminResult"></p>

</section>


<section
id="adminPanel"
class="container card"
style="display:none;">

<h2>

ثبت اطلاعیه

</h2>

<textarea

id="notice"

placeholder="متن اطلاعیه"

style="width:100%;height:160px;border-radius:15px;padding:15px;"></textarea>

<button
id="saveNotice">

ثبت اطلاعیه
  <h2>اطلاعیه‌های ثبت شده</h2>

<div id="noticeList"></div>

</button>

<hr style="margin:30px 0;">

<h2>

پیام‌های کاربران

</h2>

<div id="allMessages">

</div>
  
<button id="logoutAdmin">
خروج
</button>
  
</section>

<script src="admin.js"></script>

</body>

</html>
