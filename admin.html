<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>پنل مدیریت</title>

<style>
body{
    font-family:tahoma;
    background:#f2f2f2;
    margin:0;
}

.header{
    background:#1565c0;
    color:white;
    padding:20px;
    text-align:center;
}

.menu{
    display:flex;
    gap:15px;
    padding:20px;
    flex-wrap:wrap;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    flex:1;
    min-width:200px;
    box-shadow:0 3px 10px #ccc;
}

button{
    background:#1565c0;
    color:white;
    border:0;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="header">
<h1>پنل مدیریت سایت</h1>
<p>کلاس‌های مسجد المهدی (عج)</p>
</div>


<div class="menu">

<div class="card">
<h3>📢 مدیریت اطلاعیه‌ها</h3>

<input id="title" placeholder="عنوان اطلاعیه">

<br><br>

<textarea id="content" placeholder="متن اطلاعیه"></textarea>

<br><br>

<button onclick="addNotice()">➕ افزودن اطلاعیه</button>

<hr>

<div id="noticeList">
در حال دریافت...
</div>

</div>


<script type="module">

import { createClient } 
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";


const supabaseUrl = "https://ezrvqpnxswpzaygbjeio.supabase.co/rest/v1/";
const supabaseKey = "sb_publishable_Jr0xXzuVDA9QzEFize_dvA_ueYO-246";

const supabase = createClient(
supabaseUrl,
supabaseKey
);


const list = document.getElementById("noticeList");


// نمایش اطلاعیه‌ها

async function loadNotices(){

const {data,error}=await supabase
.from("notices")
.select("*")
.order("id",{ascending:false});


if(error){
list.innerHTML="خطا در دریافت";
return;
}


list.innerHTML="";


data.forEach(n=>{

list.innerHTML += `

<div>

<b>${n.title}</b>

<p>${n.content}</p>

<button onclick="deleteNotice(${n.id})">
🗑 حذف
</button>

<hr>

</div>

`;

});


}


window.addNotice = async function(){

let title=document.getElementById("title").value;
let content=document.getElementById("content").value;


await supabase
.from("notices")
.insert([
{
title:title,
content:content
}
]);


document.getElementById("title").value="";
document.getElementById("content").value="";


loadNotices();

}



window.deleteNotice = async function(id){

await supabase
.from("notices")
.delete()
.eq("id",id);


loadNotices();

}



loadNotices();


</script>

</body>
</html>
