<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>پنل مدیریت</title>

<style>
body{
    font-family:tahoma;
    background:#f2f2f2;
    margin:0;
}

.header{
    background:#1565c0;
    color:white;
    padding:20px;
    text-align:center;
}

.menu{
    display:flex;
    gap:15px;
    padding:20px;
    flex-wrap:wrap;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    flex:1;
    min-width:200px;
    box-shadow:0 3px 10px #ccc;
}

button{
    background:#1565c0;
    color:white;
    border:0;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="header">
<h1>پنل مدیریت سایت</h1>
<p>کلاس‌های مسجد المهدی (عج)</p>
</div>


<div class="menu">

<div class="card">
<h3>📢 اطلاعیه‌ها</h3>
<p>مدیریت اخبار و اطلاعیه‌ها</p>
<button>ورود</button>
</div>


<div class="card">
<h3>📝 ثبت‌نام‌ها</h3>
<p>مشاهده ثبت‌نام دانش‌آموزان</p>
<button>ورود</button>
</div>


<div class="card">
<h3>💬 چت‌روم</h3>
<p>مدیریت پیام‌ها</p>
<button>ورود</button>
</div>


</div>


</body>
</html>
