<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>پنل مدیریت</title>

<style>

*{
box-sizing:border-box;
font-family:tahoma;
}

body{
margin:0;
background:#f1f3f6;
}

.header{

background:#1565c0;
color:white;
padding:25px;
text-align:center;

}

.container{

padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;

}


.card{

background:white;
border-radius:20px;
padding:20px;
box-shadow:0 5px 15px #ccc;

}


input,textarea{

width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;

}


textarea{
height:120px;
}


button{

background:#1565c0;
color:white;
border:0;
padding:12px;
border-radius:10px;
cursor:pointer;
width:100%;

}


.notice{

background:#eee;
padding:15px;
border-radius:12px;
margin-top:10px;

}



</style>

</head>


<body>


<div class="header">

<h1>👑 پنل مدیریت</h1>

<p>کلاس‌های تابستانی مسجد المهدی (عج)</p>

</div>



<div class="container">



<div class="card">

<h2>📊 داشبورد</h2>

<p>وضعیت سایت: فعال ✅</p>

</div>




<div class="card">

<h2>📢 مدیریت اطلاعیه‌ها</h2>


<input id="noticeTitle" placeholder="عنوان اطلاعیه">


<textarea id="noticeContent" placeholder="متن اطلاعیه"></textarea>


<button onclick="addNotice()">
➕ افزودن اطلاعیه
</button>


<hr>


<div id="noticeList">
در حال دریافت...
</div>


</div>






<div class="card">

<h2>⚙️ تنظیمات سایت</h2>


<input id="siteTitle" placeholder="عنوان سایت">


<input id="phone" placeholder="شماره تماس">


<input id="address" placeholder="آدرس">


<textarea id="about" placeholder="درباره سایت"></textarea>


<button onclick="saveSettings()">
💾 ذخیره تنظیمات
</button>


</div>



</div>





<script type="module">


import { createClient }

from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://ezrvqpnxswpzaygbjeio.supabase.co",
  "sb_publishable_Jr0xXzuVDA9QzEFize_dvA_ueYO-246"
);



// =================
// اطلاعیه ها
// =================



async function loadNotices(){


const {data,error}=await supabase

.from("notices")

.select("*")

.order("id",{ascending:false});



if(error){

noticeList.innerHTML="خطا در دریافت اطلاعیه‌ها";

return;

}


noticeList.innerHTML="";


data.forEach(n=>{


noticeList.innerHTML += `

<div class="notice">

<b>📌 ${n.title}</b>

<p>${n.content}</p>


<button onclick="deleteNotice(${n.id})">

🗑 حذف

</button>


</div>

`;



});


}




window.addNotice=async function(){


await supabase

.from("notices")

.insert({

title:noticeTitle.value,

content:noticeContent.value

});



noticeTitle.value="";

noticeContent.value="";


loadNotices();


}




window.deleteNotice=async function(id){


await supabase

.from("notices")

.delete()

.eq("id",id);



loadNotices();


}





// =================
// تنظیمات سایت
// =================



async function loadSettings(){


const {data,error}=await supabase

.from("settings")

.select("*")

.eq("id",1)

.single();



if(data){


siteTitle.value=data.title || "";

phone.value=data.phone || "";

address.value=data.address || "";

about.value=data.about || "";


}


}



window.saveSettings=async function(){


await supabase

.from("settings")

.upsert({

id:1,

title:siteTitle.value,

phone:phone.value,

address:address.value,

about:about.value

});



alert("تنظیمات ذخیره شد ✅");


}




loadNotices();

loadSettings();



</script>


</body>

</html>
