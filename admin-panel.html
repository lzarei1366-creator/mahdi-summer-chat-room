<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<title>پنل مدیریت</title>

<style>

body{
background:#080808;
color:white;
font-family:tahoma;
padding:30px;
}

.card{
background:#151515;
padding:25px;
margin:20px;
border-radius:20px;
box-shadow:0 0 20px #009b62;
text-align:center;
}

button{
background:#009b62;
color:white;
border:0;
padding:12px;
border-radius:10px;
width:100%;
cursor:pointer;
}

a{
text-decoration:none;
}

</style>

</head>


<body>


<h1>👑 پنل مدیریت</h1>

<h3 id="role"></h3>


<div class="card">

<h2>👥 کاربران</h2>

<a href="users.html">

<button>
مدیریت کاربران
</button>

</a>

</div>



<div class="card">

<h2>💬 چت</h2>

<a href="chat-admin.html">

<button>
مدیریت چت
</button>

</a>

</div>



<script>


const admin =
localStorage.getItem("admin");


const role =
localStorage.getItem("role");



if(!admin){

window.location.href="admin-login.html";

}



document.getElementById("role").innerHTML =
"سطح دسترسی: " + role;



</script>


</body>

</html>
