<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>پنل مدیریت</title>

<style>

*{
box-sizing:border-box;
}


body{

margin:0;

min-height:100vh;

font-family:tahoma;

color:white;


background:

linear-gradient(
rgba(0,0,0,.7),
rgba(0,0,0,.9)
),

url("https://images.unsplash.com/photo-1519608487953-e999c86e7455");


background-size:cover;

background-position:center;

background-attachment:fixed;

padding:30px;

}



h1{

text-align:center;

font-size:38px;

}



h3{

text-align:center;

color:#00ff99;

}




.menu{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:25px;

margin-top:40px;

}




.card{


width:270px;



padding:30px;



background:rgba(255,255,255,.12);



backdrop-filter:blur(15px);



border-radius:30px;



text-align:center;



border:1px solid rgba(255,255,255,.2);



box-shadow:

0 0 30px rgba(0,255,150,.3);



transition:.3s;



}



.card:hover{

transform:translateY(-10px);

box-shadow:

0 0 45px rgba(0,255,150,.6);

}




.card h2{

font-size:25px;

}



.card p{

color:#ddd;

font-size:18px;

}




button{


background:

linear-gradient(
90deg,
#009b62,
#00d98b
);



color:white;



border:0;



padding:14px;



width:100%;



border-radius:15px;



cursor:pointer;



font-size:17px;



}




button:hover{

transform:scale(1.05);

}




a{

text-decoration:none;

}



.logout{


display:block;

max-width:300px;

margin:40px auto 0;



background:#b30000;



}




</style>


</head>



<body>




<h1>

👑 پنل مدیریت

</h1>



<h3 id="role"></h3>






<div class="menu">





<div class="card">


<h2>
👥 کاربران
</h2>


<p>
مدیریت کاربران
</p>


<a href="users.html">

<button>

ورود

</button>

</a>


</div>






<div class="card">


<h2>
➕ افزودن کاربر
</h2>


<p>
ساخت حساب جدید
</p>


<a href="add-user.html">

<button>

افزودن

</button>

</a>


</div>






<div class="card">


<h2>
💬 چت
</h2>


<p>
مدیریت پیام‌ها
</p>


<a href="chat-admin.html">

<button>

ورود

</button>

</a>


</div>






</div>







<button class="logout" id="logout">

🚪 خروج از مدیریت

</button>







<script>


const admin =

localStorage.getItem("admin");



const role =

localStorage.getItem("role");





if(!admin){

window.location.href="admin-login.html";

}





document.getElementById("role").innerHTML=

"👤 "+admin+" | سطح دسترسی: "+(role || "admin");






document.getElementById("logout").onclick=()=>{


localStorage.removeItem("admin");

localStorage.removeItem("role");



window.location.href="admin-login.html";


};




</script>



</body>

</html>
