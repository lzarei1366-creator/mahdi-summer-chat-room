<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مدیریت کاربران</title>

<style>

body{
background:#080808;
color:white;
font-family:tahoma;
padding:30px;
}

h1{
text-align:center;
}

.box{

background:#151515;
padding:20px;
margin:15px auto;
max-width:500px;
border-radius:15px;
box-shadow:0 0 15px #009b62;

}

button{

color:white;
border:0;
padding:10px;
border-radius:8px;
margin:5px;
cursor:pointer;

}

.delete{
background:#b30000;
}

.block{
background:#996600;
}

.active{
background:#009b62;
}

</style>

</head>


<body>


<h1>👥 مدیریت کاربران</h1>


<div id="users"></div>




<script type="module">


import { createClient }

from "https://esm.sh/@supabase/supabase-js@2";




const supabase = createClient(

"https://ezrvqpnxswpzaygbjeio.supabase.co",

"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6cnZxcG54c3dwemF5Z2JqZWlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MjE4NDcsImV4cCI6MjA5OTE5Nzg0N30.w13RkRJ9_uxCIHRb8cvShmtrmXGskuUYRlfZ8w8OQIs"

);




const box =
document.getElementById("users");






async function loadUsers(){



const {data,error}=await supabase

.from("users")

.select("*")

.order("id");





if(error){

alert(error.message);

return;

}





box.innerHTML="";





data.forEach(user=>{



box.innerHTML += `


<div class="box">


<h3>
👤 ${user.name}
</h3>


<p>
یوزرنیم: ${user.username}
</p>


<p>
وضعیت: ${user.status}
</p>




<button class="block"

onclick="changeStatus('${user.id}','blocked')">

🚫 مسدود کردن

</button>





<button class="active"

onclick="changeStatus('${user.id}','active')">

✅ فعال کردن

</button>





<button class="delete"

onclick="removeUser('${user.id}')">

🗑 حذف کاربر

</button>



</div>



`;



});



}








window.changeStatus = async(id,status)=>{



const {error}=await supabase

.from("users")

.update({

status:status

})

.eq("id",id);





if(error){

alert(error.message);

return;

}




alert("وضعیت تغییر کرد");

loadUsers();



};









window.removeUser = async(id)=>{



if(!confirm("کاربر حذف شود؟")){

return;

}





const {error}=await supabase

.from("users")

.delete()

.eq("id",id);






if(error){

alert(error.message);

return;

}




alert("کاربر حذف شد");


loadUsers();



};







loadUsers();



</script>



</body>

</html>
