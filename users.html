<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مدیریت کاربران</title>

<style>

body{
    background:#080808;
    color:white;
    font-family:tahoma;
    padding:30px;
}

h1{
    text-align:center;
}

.box{
    background:#151515;
    padding:20px;
    border-radius:15px;
    margin:15px auto;
    max-width:500px;
    box-shadow:0 0 15px #009b62;
}

button{
    background:#b30000;
    color:white;
    border:0;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}

.active{
    color:#00ff99;
}

.blocked{
    color:red;
}

</style>

</head>


<body>

<h1>👥 مدیریت کاربران</h1>

<div id="users"></div>



<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getFirestore,

collection,

onSnapshot,

doc,

updateDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyB2oPTrdqG6HWVLIPoh_HOmXHb98sHEQKg",

authDomain: "mahdi-summer-chat.firebaseapp.com",

projectId: "mahdi-summer-chat",

storageBucket: "mahdi-summer-chat.firebasestorage.app",

messagingSenderId: "189185718526",

appId: "1:189185718526:web:497085957853202ebb4daf"

};



const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



const usersBox =
document.getElementById("users");



onSnapshot(

collection(db,"users"),

(snapshot)=>{


usersBox.innerHTML="";


snapshot.forEach((item)=>{


const user =
item.data();


let status =
user.status || "active";



usersBox.innerHTML += `

<div class="box">

<p>📧 ایمیل:</p>

<p>${user.email || "بدون ایمیل"}</p>


<p>

وضعیت:

<span class="${status}">

${status}

</span>

</p>


<button onclick="blockUser('${item.id}')">

مسدود کردن

</button>


</div>

`;



});


}

);




window.blockUser = async function(id){


await updateDoc(

doc(db,"users",id),

{

status:"blocked"

}

);


alert("کاربر مسدود شد");


}



</script>


</body>

</html>
