<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<title>مدیریت کاربران</title>

<style>

body{
background:#080808;
color:white;
font-family:tahoma;
padding:30px;
}

.box{

background:#151515;
padding:20px;
margin:15px auto;
max-width:500px;
border-radius:15px;
box-shadow:0 0 15px #009b62;

}

button{

color:white;
border:0;
padding:10px;
border-radius:8px;
margin:5px;
cursor:pointer;

}

.delete{
background:#b30000;
}

.block{
background:#996600;
}

.active{
background:#009b62;
}

</style>

</head>


<body>


<h1>👥 مدیریت کاربران</h1>


<div id="users"></div>



<script type="module">


import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
deleteDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyB2oPTrdqG6HWVLIPoh_HOmXHb98sHEQKg",

authDomain: "mahdi-summer-chat.firebaseapp.com",

projectId: "mahdi-summer-chat",

storageBucket: "mahdi-summer-chat.firebasestorage.app",

messagingSenderId: "189185718526",

appId: "1:189185718526:web:497085957853202ebb4daf"

};



const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



const box =
document.getElementById("users");



onSnapshot(

collection(db,"users"),

(snapshot)=>{


box.innerHTML="";


snapshot.forEach((item)=>{


const user =
item.data();



box.innerHTML += `

<div class="box">

<h3>👤 ${user.name}</h3>

<p>یوزرنیم: ${user.username}</p>

<p>وضعیت: ${user.status}</p>


<button class="block"
onclick="changeStatus('${item.id}','blocked')">

مسدود کردن

</button>


<button class="active"
onclick="changeStatus('${item.id}','active')">

فعال کردن

</button>


<button class="delete"
onclick="removeUser('${item.id}')">

حذف کاربر

</button>


</div>

`;


});


}

);




window.changeStatus = async(id,status)=>{


await updateDoc(

doc(db,"users",id),

{

status:status

}

);


};



window.removeUser = async(id)=>{


if(confirm("حذف شود؟")){


await deleteDoc(

doc(db,"users",id)

);


}


};



</script>


</body>

</html>
